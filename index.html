<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de QR Wi-Fi — EspaçoNet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

  <header>
    <img src="assets/logo_espaconet.png" alt="EspaçoNet Telecom" class="header-logo">
    <div class="header-text">
      <h1>Gerador de QR Wi-Fi</h1>
      <p class="header-subtitle">Ferramenta interna &mdash; EspaçoNet Telecom</p>
    </div>
  </header>

  <main>
    <!-- ── COLUNA ESQUERDA: FORMULÁRIO ──────────────────────────────── -->
    <div class="form-column">
      <form id="wifiForm" novalidate autocomplete="off">

        <div class="form-group">
          <label for="ssid"><span id="ssidLabelText">Nome da rede (SSID)</span> <span class="required">*</span></label>
          <input type="text" id="ssid" placeholder="Ex: MinhaRede" maxlength="64">
          <span class="error-msg" id="ssid-error"></span>
        </div>

        <div class="form-group">
          <label>Dual Band</label>
          <div class="toggle-group">
            <label class="toggle" aria-label="Dual Band">
              <input type="checkbox" id="dualBand" checked>
              <span class="toggle-slider"></span>
            </label>
            <span id="dualBandLabel" class="toggle-label">Ativo</span>
          </div>
        </div>

        <div class="form-group hidden" id="ssid5gGroup">
          <label for="ssid5g">Nome da rede 5 GHz (SSID) <span class="required">*</span></label>
          <input type="text" id="ssid5g" placeholder="Ex: MinhaRede_5G" maxlength="64">
          <span class="error-msg" id="ssid5g-error"></span>
        </div>

        <div class="form-group">
          <label for="securityType">Tipo de segurança <span class="required">*</span></label>
          <select id="securityType">
            <option value="WPA">WPA (Personal) — WPA/WPA2/WPA3</option>
            <option value="WEP">WEP</option>
            <option value="nopass">Aberta (sem senha)</option>
            <option value="WPA2-EAP">WPA2-EAP (Enterprise)</option>
          </select>
        </div>

        <div class="form-group" id="passwordGroup">
          <label for="password">Senha <span class="required">*</span></label>
          <div class="password-input-wrapper">
            <input type="text" id="password" placeholder="Senha da rede Wi-Fi" maxlength="128">
            <button type="button" id="togglePassword" class="is-open" title="Ocultar senha" aria-label="Ocultar senha" aria-pressed="true">
              <svg id="eyeIcon" class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path class="eye-outline" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle class="eye-pupil" cx="12" cy="12" r="3"/>
                <path class="eye-lid" d="M4 12c2.4-2.2 5.1-3.3 8-3.3s5.6 1.1 8 3.3"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="password-error"></span>
        </div>

        <div class="form-group">
          <label>Rede oculta</label>
          <div class="toggle-group">
            <label class="toggle" aria-label="Rede oculta">
              <input type="checkbox" id="hidden">
              <span class="toggle-slider"></span>
            </label>
            <span id="hiddenLabel" class="toggle-label">Não</span>
          </div>
        </div>

        <!-- ── CAMPOS ENTERPRISE ──── -->
        <div id="enterpriseFields" class="enterprise-section">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Configurações Enterprise (WPA2-EAP)
          </div>

          <div class="form-group">
            <label for="eapMethod">EAP Method <span class="required">*</span></label>
            <select id="eapMethod">
              <option value="PEAP">PEAP</option>
              <option value="TTLS">TTLS</option>
              <option value="TLS">TLS</option>
              <option value="PWD">PWD</option>
              <option value="SIM">SIM</option>
              <option value="AKA">AKA</option>
              <option value="AKA'">AKA'</option>
            </select>
          </div>

          <div class="form-group">
            <label for="identity">Identity (usuário) <span class="required">*</span></label>
            <input type="text" id="identity" placeholder="usuario@dominio.com" maxlength="128">
            <span class="error-msg" id="identity-error"></span>
          </div>

          <div class="form-group">
            <label for="eapPassword">Password <span class="required">*</span></label>
            <input type="password" id="eapPassword" placeholder="Senha Enterprise" maxlength="128">
            <span class="error-msg" id="eapPassword-error"></span>
          </div>

          <div class="form-group">
            <label for="phase2">Phase 2 <span class="optional">(opcional)</span></label>
            <input type="text" id="phase2" placeholder="Ex: MSCHAPV2" maxlength="64">
          </div>

          <div class="form-group">
            <label for="anonymousIdentity">Anonymous Identity <span class="optional">(opcional)</span></label>
            <input type="text" id="anonymousIdentity" placeholder="anonymous@dominio.com" maxlength="128">
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="generateBtn" class="btn-generate">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Gerar QR Wi-Fi
          </button>
          <button type="button" id="clearBtn" class="btn-secondary">Limpar</button>
        </div>

      </form>
    </div>

    <!-- ── COLUNA DIREITA: PREVIEW + DOWNLOADS ───────────────────────── -->
    <div class="preview-column">

      <div class="preview-header">
        <h2>Preview</h2>
        <div class="quality-toggle">
          <span class="quality-label">Qualidade:</span>
          <label><input type="radio" name="quality" value="normal"> Normal</label>
          <label><input type="radio" name="quality" value="high" checked> Alta</label>
        </div>
      </div>

      <div class="preview-container" id="previewContainer">
        <canvas id="previewCanvas" aria-label="Preview do QR e card Wi-Fi" style="display:none"></canvas>
        <div id="validationMessage" class="validation-message">
          <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Preencha os campos e clique em <strong>Gerar QR Wi-Fi</strong>.
        </div>
      </div>

      <div class="download-actions">
        <button id="downloadCombo" class="btn-primary download-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Baixar Wi-Fi (.png)
        </button>
        <button id="downloadCard" class="btn-secondary-action download-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Baixar Card
        </button>
        <button id="downloadQR" class="btn-secondary-action download-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Baixar QR
        </button>
        <button id="printBtn" class="btn-print download-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimir
        </button>
      </div>

      <!-- ── Opções de tamanho de impressão ── -->
      <div class="print-options">
        <span class="print-options-label">Tamanho de impressão</span>
        <div class="print-size-radios">
          <label class="print-opt-radio">
            <input type="radio" name="printSize" value="default" checked>
            <span>Padrão</span>
          </label>
          <label class="print-opt-radio">
            <input type="radio" name="printSize" value="full">
            <span>Folha inteira</span>
          </label>
          <label class="print-opt-radio">
            <input type="radio" name="printSize" value="custom">
            <span>Personalizado</span>
          </label>
        </div>
        <div class="print-custom-inputs" id="printCustomInputs">
          <div class="print-custom-field">
            <label for="printCustomW">Largura</label>
            <div class="print-custom-input-wrap">
              <input type="number" id="printCustomW" min="1" max="20" step="0.1" value="11.2">
              <span>cm</span>
            </div>
          </div>
          <span class="print-custom-x">×</span>
          <div class="print-custom-field">
            <label for="printCustomH">Altura</label>
            <div class="print-custom-input-wrap">
              <input type="number" id="printCustomH" min="1" max="28" step="0.1" value="13.0">
              <span>cm</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- ── HISTÓRICO ────────────────────────────────────────────────── -->
    <div class="history-column">
      <div class="history-header">
        <h2>Histórico</h2>
        <span class="history-status" id="syncStatus">
          <span class="sync-dot"></span>
          <span id="syncText">Conectando...</span>
        </span>
      </div>
      <div id="historyList" class="history-list">
        <div id="historySkeleton" class="history-skeleton">
          <div class="skeleton-item"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line short" style="width:45%"></div></div>
          <div class="skeleton-item"><div class="skeleton-line" style="width:55%"></div><div class="skeleton-line short" style="width:40%"></div></div>
          <div class="skeleton-item"><div class="skeleton-line" style="width:65%"></div><div class="skeleton-line short" style="width:50%"></div></div>
        </div>
      </div>
    </div>

  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="lib/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
